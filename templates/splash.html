{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AgriGov Market</title>
  <meta name="theme-color" content="#1C7C43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="AgriGov">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="{% static 'icons/icon-192x192.png' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      background: linear-gradient(160deg, #0F5C28 0%, #1C7C43 45%, #2EA558 100%);
    }

    /* ── Splash Container ── */
    .splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: env(safe-area-inset-top,24px) 32px env(safe-area-inset-bottom,32px);
      min-height: 100dvh;
    }

    /* ── Decorative Orbs ── */
    .orb {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,0.06); pointer-events: none;
    }
    .orb-1 { width: 280px; height: 280px; top: -80px; right: -80px; animation: float 6s ease-in-out infinite; }
    .orb-2 { width: 200px; height: 200px; bottom: -60px; left: -60px; animation: float 8s ease-in-out infinite reverse; }
    .orb-3 { width: 120px; height: 120px; top: 40%; left: 10%; animation: float 7s ease-in-out infinite 1s; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }

    /* ── Logo Block ── */
    .logo-block {
      display: flex; flex-direction: column; align-items: center;
      animation: logoIn 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
    }
    @keyframes logoIn {
      from { transform: scale(0.35) rotate(-12deg); opacity: 0; }
      to   { transform: scale(1) rotate(0);         opacity: 1; }
    }

    .logo-icon {
      width: 96px; height: 96px; border-radius: 28px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    /* ── App Name ── */
    .app-name {
      font-size: 2.25rem; font-weight: 900; color: #fff;
      letter-spacing: -0.05em; line-height: 1;
      animation: textIn 0.5s ease 0.75s both;
    }
    .app-name span { color: #7FE8A8; }

    .app-tagline {
      font-size: 0.75rem; font-weight: 600; color: rgba(255,255,255,0.65);
      letter-spacing: 0.12em; text-transform: uppercase;
      margin-top: 8px;
      animation: textIn 0.5s ease 0.95s both;
    }

    @keyframes textIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Ministry Badge ── */
    .ministry-badge {
      margin-top: 28px;
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px; padding: 8px 16px;
      font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.85);
      letter-spacing: 0.02em;
      animation: textIn 0.5s ease 1.1s both;
      backdrop-filter: blur(8px);
    }
    .ministry-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #7FE8A8; flex-shrink: 0;
      animation: blink 1.5s ease-in-out 1.5s infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── Progress Bar ── */
    .progress-wrap {
      position: absolute;
      bottom: calc(48px + env(safe-area-inset-bottom, 0px));
      width: 56px; height: 4px;
      background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden;
      animation: textIn 0.4s ease 1.2s both;
    }
    .progress-bar {
      height: 100%; width: 0%; background: rgba(255,255,255,0.9);
      border-radius: 4px; animation: progress 1.3s ease 1.4s forwards;
    }
    @keyframes progress { from { width: 0%; } to { width: 100%; } }

    /* ── Roles Preview (subtle) ── */
    .roles-preview {
      position: absolute;
      bottom: calc(80px + env(safe-area-inset-bottom, 0px));
      display: flex; gap: 12px;
      animation: textIn 0.5s ease 1.3s both;
    }
    .role-dot {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .role-dot-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; backdrop-filter: blur(8px);
    }
    .role-dot-label {
      font-size: 0.55rem; font-weight: 600; color: rgba(255,255,255,0.6);
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<div class="splash">
  <!-- Decorative orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Logo -->
  <div class="logo-block">
    <div class="logo-icon">🌿</div>
    <div class="app-name">Agri<span>Gov</span></div>
    <div class="app-tagline">Plateforme Agricole Nationale</div>
    <div class="ministry-badge">
      <div class="ministry-dot"></div>
      Ministère de l'Agriculture · Algérie
    </div>
  </div>

  <!-- Roles preview -->
  <div class="roles-preview">
    <div class="role-dot">
      <div class="role-dot-icon">🌾</div>
      <div class="role-dot-label">Agriculteur</div>
    </div>
    <div class="role-dot">
      <div class="role-dot-icon">🛒</div>
      <div class="role-dot-label">Acheteur</div>
    </div>
    <div class="role-dot">
      <div class="role-dot-icon">🚛</div>
      <div class="role-dot-label">Transport</div>
    </div>
    <div class="role-dot">
      <div class="role-dot-icon">🐾</div>
      <div class="role-dot-label">Vétérinaire</div>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
</div>

<script>
  // Auto-redirect after splash completes (2.9s total animation)
  const dest = sessionStorage.getItem('agrigov_splash_done')
    ? '{% url "login" %}'
    : '{% url "home" %}';

  setTimeout(() => {
    sessionStorage.setItem('agrigov_splash_done', '1');

    // Only redirect if coming from PWA (standalone)
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone;

    if (isStandalone) {
      window.location.href = dest;
    } else {
      // On browser: just fade and let the page stay visible
      document.querySelector('.splash').style.display = 'none';
      window.location.href = '{% url "home" %}';
    }
  }, 2900);
</script>

</body>
</html>
